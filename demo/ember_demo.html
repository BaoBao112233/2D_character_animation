<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ember — 2D Animation Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center;
         justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  canvas { border: 2px solid #c8a84b; border-radius: 8px; image-rendering: pixelated; }
  #ui { color: #f0d080; margin-top: 12px; font-size: 13px; letter-spacing: 1px; text-align: center; }
  #state-badge {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.6); border: 1px solid #c8a84b; color: #f0d080;
    padding: 4px 16px; border-radius: 20px; font-size: 14px; letter-spacing: 2px;
    pointer-events: none;
  }
  #controls {
    margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }
  .key { background: #2a2a4a; border: 1px solid #c8a84b; color: #f0d080;
         padding: 4px 10px; border-radius: 4px; font-size: 12px; }
  .key span { color: #fff; font-weight: bold; }
</style>
</head>
<body>

<div id="state-badge">IDLE</div>
<canvas id="c" width="800" height="450"></canvas>

<div id="controls">
  <div class="key"><span>A / D</span> Di chuyển</div>
  <div class="key"><span>Shift</span> Chạy</div>
  <div class="key"><span>Space</span> Nhảy</div>
  <div class="key"><span>J</span> Bắn</div>
  <div class="key"><span>K</span> Dash Attack</div>
  <div class="key"><span>L</span> Evade</div>
  <div class="key"><span>I</span> Parry</div>
  <div class="key"><span>H</span> Hurt</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const badge = document.getElementById('state-badge');

// ──────────────────────────────────────────────
//  CONSTANTS
// ──────────────────────────────────────────────
const W = canvas.width, H = canvas.height;
const GROUND_Y = H - 60;
const WALK_SPEED = 2.8, RUN_SPEED = 6;
const JUMP_FORCE = -14, GRAVITY = 0.55;
const EMBER_COLORS = {
  skin:    '#f5c5a3',
  hair:    '#e06020',
  coat:    '#6b4226',
  shirt:   '#3a6b3a',
  belt:    '#8b6914',
  pants:   '#5a3d1a',
  boot:    '#3a2a14',
  metal:   '#9aadba',
  saber:   '#40c8ff',
  blaster: '#b08030',
  glow:    'rgba(64,200,255,',
};

// ──────────────────────────────────────────────
//  INPUT
// ──────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true;  handleAction(e.key); });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

// ──────────────────────────────────────────────
//  EMBER STATE MACHINE
// ──────────────────────────────────────────────
const STATE = {
  IDLE:'IDLE', WALK:'WALK', RUN:'RUN',
  JUMP:'JUMP', FALL:'FALL', LAND:'LAND',
  SHOOT:'SHOOT', DASH_ATTACK:'DASH ATTACK',
  EVADE:'EVADE', PARRY:'PARRY',
  HURT:'HURT', DEATH:'DEATH'
};

const ember = {
  x: W / 2, y: GROUND_Y,
  vy: 0,
  facingRight: true,
  state: STATE.IDLE,
  prevState: STATE.IDLE,
  stateTimer: 0,
  animT: 0,           // animation frame counter
  isGrounded: true,
  isDead: false,
  hp: 100,
  // Limb angles (radians)
  limbs: {
    torsoRot:0, headRot:0, hairSwing:0,
    armR_up:0, armR_low:0,
    armL_up:0, armL_low:0,
    legR_up:0, legR_low:0,
    legL_up:0, legL_low:0,
    coatTail:0,
    shootMuzzle:0,
  },
  // VFX
  vfx: [],
};

// ──────────────────────────────────────────────
//  PARALLAX BACKGROUND
// ──────────────────────────────────────────────
const bgLayers = [
  { color:'#0d0d1f', speed:0 },
];

// Particle / VFX pool
function spawnVFX(x, y, type) {
  const count = type==='dash' ? 12 : type==='shoot' ? 6 : type==='parry' ? 10 : 5;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    ember.vfx.push({
      x, y,
      vx: Math.cos(angle)*speed * (type==='shoot' ? 2 : 1),
      vy: Math.sin(angle)*speed - (type==='shoot' ? 2 : 0),
      life: 1, decay: Math.random()*0.04+0.03,
      size: Math.random()*5+2,
      color: type==='dash' ? EMBER_COLORS.saber :
             type==='shoot' ? '#ffaa00' :
             type==='parry' ? '#ffffff' : '#ff4444',
      glow: type !== 'hurt'
    });
  }
}

// ──────────────────────────────────────────────
//  ACTION TRIGGERS
// ──────────────────────────────────────────────
function handleAction(key) {
  if (ember.isDead) return;
  const e = ember;
  if (key === ' ' && e.isGrounded) { setState(STATE.JUMP); e.vy = JUMP_FORCE; }
  if (key === 'j' || key === 'J') { if(!isInCombat()) { setState(STATE.SHOOT); } }
  if (key === 'k' || key === 'K') { if(!isInCombat()) { setState(STATE.DASH_ATTACK); spawnVFX(e.x + (e.facingRight?40:-40), e.y-50, 'dash'); } }
  if (key === 'l' || key === 'L') { if(!isInCombat()) setState(STATE.EVADE); }
  if (key === 'i' || key === 'I') { if(!isInCombat()) setState(STATE.PARRY); }
  if (key === 'h' || key === 'H') { setState(STATE.HURT); }
}

function isInCombat() {
  return [STATE.SHOOT, STATE.DASH_ATTACK, STATE.EVADE, STATE.PARRY, STATE.HURT, STATE.DEATH, STATE.LAND]
    .includes(ember.state);
}

function setState(s) {
  ember.prevState = ember.state;
  ember.state = s;
  ember.stateTimer = 0;
  badge.textContent = s;
}

// ──────────────────────────────────────────────
//  LERP helper
// ──────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function sin(t, amp=1, freq=1, phase=0) { return Math.sin(t * freq + phase) * amp; }

// ──────────────────────────────────────────────
//  ANIMATION — compute limb angles per state
// ──────────────────────────────────────────────
function updateAnimation() {
  const e = ember;
  const t = e.animT;
  const L = e.limbs;
  const dt = 0.08;
  e.animT += dt;
  e.stateTimer += dt;

  const s = e.state;

  // ── IDLE ──
  if (s === STATE.IDLE) {
    const b = sin(t, 0.03, 1);       // breathing
    L.torsoRot  = lerp(L.torsoRot,  b, 0.05);
    L.headRot   = lerp(L.headRot,   b*0.5, 0.05);
    L.hairSwing = lerp(L.hairSwing, sin(t, 0.07, 0.8), 0.05);
    L.coatTail  = lerp(L.coatTail,  sin(t, 0.06, 0.9, 0.5), 0.05);
    L.armR_up   = lerp(L.armR_up,   0.2+b*0.05, 0.05);
    L.armL_up   = lerp(L.armL_up,  -0.2+b*0.05, 0.05);
    L.armR_low  = lerp(L.armR_low,  0.3, 0.05);
    L.armL_low  = lerp(L.armL_low, -0.3, 0.05);
    L.legR_up   = lerp(L.legR_up,   0, 0.08);
    L.legL_up   = lerp(L.legL_up,   0, 0.08);
    L.legR_low  = lerp(L.legR_low,  0.05, 0.08);
    L.legL_low  = lerp(L.legL_low,  0.05, 0.08);
    // Mana-Saber subtle glow pulse handled in draw
  }

  // ── WALK ──
  else if (s === STATE.WALK) {
    const sw = sin(t, 1, 3.5);
    L.torsoRot  = lerp(L.torsoRot,  sin(t, 0.06, 3.5), 0.1);
    L.headRot   = lerp(L.headRot,   sin(t, 0.04, 3.5), 0.08);
    L.hairSwing = sin(t, 0.12, 3.5);
    L.coatTail  = sin(t, 0.15, 3.5, Math.PI);
    L.armR_up   = sin(t, 0.55, 3.5);
    L.armL_up   = sin(t, 0.55, 3.5, Math.PI);
    L.armR_low  = 0.4 + sin(t, 0.2, 3.5)*0.3;
    L.armL_low  = -(0.4+sin(t, 0.2, 3.5, Math.PI)*0.3);
    L.legR_up   = sin(t, 0.5, 3.5);
    L.legL_up   = sin(t, 0.5, 3.5, Math.PI);
    L.legR_low  = Math.max(0, sin(t, 0.45, 3.5, 0.5));
    L.legL_low  = Math.max(0, sin(t, 0.45, 3.5, Math.PI+0.5));
  }

  // ── RUN ──
  else if (s === STATE.RUN) {
    L.torsoRot  = lerp(L.torsoRot, -0.18 + sin(t, 0.1, 6), 0.12);
    L.headRot   = lerp(L.headRot,  -0.12, 0.08);
    L.hairSwing = sin(t, 0.25, 6, Math.PI);
    L.coatTail  = 0.35 + sin(t, 0.2, 6);
    L.armR_up   = sin(t, 1.0, 6);
    L.armL_up   = sin(t, 1.0, 6, Math.PI);
    L.armR_low  = 0.5 + sin(t, 0.3, 6)*0.4;
    L.armL_low  = -(0.5+sin(t, 0.3, 6, Math.PI)*0.4);
    L.legR_up   = sin(t, 0.85, 6);
    L.legL_up   = sin(t, 0.85, 6, Math.PI);
    L.legR_low  = Math.max(0, sin(t, 0.7, 6, 0.5));
    L.legL_low  = Math.max(0, sin(t, 0.7, 6, Math.PI+0.5));
  }

  // ── JUMP / FALL ──
  else if (s === STATE.JUMP || s === STATE.FALL) {
    const rising = e.vy < 0;
    L.torsoRot  = lerp(L.torsoRot,  rising ? -0.2 : 0.15, 0.1);
    L.armR_up   = lerp(L.armR_up,   rising ? -0.8 : 0.5, 0.1);
    L.armL_up   = lerp(L.armL_up,   rising ? -0.8 : 0.5, 0.1);
    L.armR_low  = lerp(L.armR_low,  0.6, 0.1);
    L.armL_low  = lerp(L.armL_low, -0.6, 0.1);
    L.legR_up   = lerp(L.legR_up,   rising ? 0.4 : -0.3, 0.1);
    L.legL_up   = lerp(L.legL_up,   rising ? 0.4 : -0.3, 0.1);
    L.legR_low  = lerp(L.legR_low,  rising ? 0.6 : 0.1, 0.1);
    L.legL_low  = lerp(L.legL_low,  rising ? 0.6 : 0.1, 0.1);
    L.hairSwing = lerp(L.hairSwing, rising ? -0.2 : 0.25, 0.12);
    L.coatTail  = lerp(L.coatTail,  rising ? -0.15 : 0.3, 0.12);
  }

  // ── LAND ──
  else if (s === STATE.LAND) {
    const pct = Math.min(e.stateTimer / 0.5, 1);
    L.torsoRot = lerp(0.4, 0, pct);
    L.legR_up  = lerp(-0.2, 0, pct);
    L.legL_up  = lerp(-0.2, 0, pct);
    L.legR_low = lerp(0.5, 0.05, pct);
    L.legL_low = lerp(0.5, 0.05, pct);
    if (pct >= 1) setState(STATE.IDLE);
  }

  // ── SHOOT ──
  else if (s === STATE.SHOOT) {
    const pct = e.stateTimer;
    if (pct < 0.3) {
      // Wind up
      L.armL_up  = lerp(L.armL_up, -1.1, 0.2);
      L.armL_low = lerp(L.armL_low, 0, 0.2);
    } else if (pct < 0.6) {
      // Fire
      L.armL_up  = lerp(L.armL_up, -0.9, 0.4);
      L.shootMuzzle = 1;
      if (pct < 0.45) spawnVFX(
        e.x + (e.facingRight ? 60 : -60),
        e.y - 65, 'shoot'
      );
    } else if (pct < 1.2) {
      L.shootMuzzle = Math.max(0, 1 - (pct - 0.6) * 3);
      L.armL_up = lerp(L.armL_up, -0.3, 0.1);
    } else {
      L.shootMuzzle = 0;
      setState(STATE.IDLE);
    }
  }

  // ── DASH ATTACK ──
  else if (s === STATE.DASH_ATTACK) {
    const pct = e.stateTimer;
    // Leap forward
    if (pct < 0.2) {
      e.x += e.facingRight ? 5 : -5;
    } else if (pct < 0.8) {
      e.x += e.facingRight ? 9 : -9;
      if (Math.random() < 0.3) spawnVFX(e.x + (e.facingRight?-20:20), e.y-50, 'dash');
    }
    // Pose: leap with saber extended
    L.torsoRot  = lerp(L.torsoRot, -0.35, 0.15);
    L.armR_up   = lerp(L.armR_up,   1.5, 0.18);
    L.armR_low  = lerp(L.armR_low,  1.6, 0.18);
    L.armL_up   = lerp(L.armL_up,  -1.0, 0.15);
    L.armL_low  = lerp(L.armL_low, -0.5, 0.12);
    L.legR_up   = lerp(L.legR_up,   1.1, 0.12);
    L.legL_up   = lerp(L.legL_up,  -0.7, 0.12);
    L.legR_low  = lerp(L.legR_low,  1.2, 0.12);
    L.legL_low  = lerp(L.legL_low,  0.2, 0.12);
    L.hairSwing = lerp(L.hairSwing, 0.4, 0.12);
    L.coatTail  = lerp(L.coatTail,  0.55, 0.12);
    if (pct > 1.1) setState(STATE.IDLE);
  }

  // ── EVADE ──
  else if (s === STATE.EVADE) {
    const pct = e.stateTimer;
    const dir = e.facingRight ? -1 : 1;
    if (pct < 0.6) {
      e.x += dir * 8;
      L.torsoRot = lerp(L.torsoRot, dir*0.5, 0.2);
      L.legR_up  = lerp(L.legR_up,  0.8, 0.2);
      L.legL_up  = lerp(L.legL_up, -0.5, 0.2);
      L.armR_up  = lerp(L.armR_up,  0.6, 0.15);
      L.armL_up  = lerp(L.armL_up, -0.6, 0.15);
    } else if (pct < 1.0) {
      e.x += dir * 3;
      L.torsoRot = lerp(L.torsoRot, 0, 0.1);
    } else {
      setState(STATE.IDLE);
    }
  }

  // ── PARRY ──
  else if (s === STATE.PARRY) {
    const pct = e.stateTimer;
    if (pct < 0.25) {
      // Guard up
      L.armR_up  = lerp(L.armR_up,  1.0, 0.25);
      L.armR_low = lerp(L.armR_low, 1.2, 0.25);
      L.armL_up  = lerp(L.armL_up, -1.0, 0.25);
      L.armL_low = lerp(L.armL_low,-0.8, 0.25);
      L.torsoRot = lerp(L.torsoRot, 0.2, 0.2);
    } else if (pct < 0.7) {
      // Hold
    } else if (pct < 1.0) {
      // Riposte with saber
      L.armR_up  = lerp(L.armR_up,  -1.3, 0.3);
      L.armR_low = lerp(L.armR_low,  1.8, 0.3);
      if (pct > 0.75 && pct < 0.8)
        spawnVFX(e.x+(e.facingRight?55:-55), e.y-70, 'parry');
    } else if (pct < 1.5) {
      // Recovery
      L.torsoRot = lerp(L.torsoRot, 0, 0.08);
    } else {
      setState(STATE.IDLE);
    }
  }

  // ── HURT ──
  else if (s === STATE.HURT) {
    const pct = e.stateTimer;
    const knockback = e.facingRight ? -4 : 4;
    if (pct < 0.3) {
      e.x += knockback;
      L.torsoRot = lerp(L.torsoRot, 0.6, 0.3);
      L.headRot  = lerp(L.headRot,  0.3, 0.3);
      L.armR_up  = lerp(L.armR_up, -0.5, 0.2);
      L.armL_up  = lerp(L.armL_up,  0.5, 0.2);
      spawnVFX(e.x, e.y-60, 'hurt');
    } else if (pct < 0.8) {
      L.torsoRot = lerp(L.torsoRot, 0, 0.08);
    } else {
      setState(STATE.IDLE);
    }
  }

  // ── DEATH ──
  else if (s === STATE.DEATH) {
    const pct = Math.min(e.stateTimer / 1.5, 1);
    L.torsoRot = lerp(L.torsoRot,  1.4, 0.05);
    L.armR_up  = lerp(L.armR_up,   0.6, 0.05);
    L.armL_up  = lerp(L.armL_up,  -0.6, 0.05);
    L.legR_up  = lerp(L.legR_up,  -0.3, 0.05);
    L.legL_up  = lerp(L.legL_up,  -0.6, 0.05);
    if (pct >= 1) ember.isDead = true;
  }
}

// ──────────────────────────────────────────────
//  PHYSICS
// ──────────────────────────────────────────────
function updatePhysics() {
  const e = ember;
  if (e.isDead) return;

  // Horizontal
  let moveDir = 0;
  if (keys['a'] || keys['A'] || keys['ArrowLeft'])  moveDir = -1;
  if (keys['d'] || keys['D'] || keys['ArrowRight']) moveDir =  1;

  const inCombat = isInCombat() && e.state !== STATE.HURT;

  if (moveDir !== 0 && !inCombat) {
    e.facingRight = moveDir > 0;
    const spd = (keys['Shift']) ? RUN_SPEED : WALK_SPEED;
    e.x += moveDir * spd;
    if (e.isGrounded) {
      if (e.state !== STATE.WALK && e.state !== STATE.RUN) {
        setState(keys['Shift'] ? STATE.RUN : STATE.WALK);
      } else if (keys['Shift'] && e.state === STATE.WALK) {
        setState(STATE.RUN);
      } else if (!keys['Shift'] && e.state === STATE.RUN) {
        setState(STATE.WALK);
      }
    }
  } else if (e.state === STATE.WALK || e.state === STATE.RUN) {
    setState(STATE.IDLE);
  }

  // Gravity
  if (!e.isGrounded) {
    e.vy += GRAVITY;
    e.y  += e.vy;
    if (e.vy > 0 && e.state !== STATE.FALL && e.state !== STATE.DASH_ATTACK)
      setState(STATE.FALL);
  }

  // Ground collision
  if (e.y >= GROUND_Y) {
    e.y = GROUND_Y;
    if (!e.isGrounded) {
      e.isGrounded = true;
      e.vy = 0;
      if (e.state === STATE.FALL || e.state === STATE.JUMP)
        setState(STATE.LAND);
    }
  } else {
    e.isGrounded = false;
  }

  // Clamp to canvas
  e.x = Math.max(40, Math.min(W - 40, e.x));
}

// ──────────────────────────────────────────────
//  DRAWING
// ──────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, '#0d0d1f');
  grd.addColorStop(0.75, '#1a0d2e');
  grd.addColorStop(1, '#2a1a0e');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,200,0.7)';
  const starSeeds = [[50,30], [120,80], [230,20], [380,55], [490,15],
    [560,70], [680,25], [750,90], [800,40], [170,130], [640,120]];
  for (const [sx,sy] of starSeeds) {
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI*2);
    ctx.fill();
  }

  // Ground
  const grdFloor = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grdFloor.addColorStop(0, '#3a2a14');
  grdFloor.addColorStop(1, '#1a0d04');
  ctx.fillStyle = grdFloor;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Ground line glow
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  ctx.globalAlpha = 1;
}

// ── VFX ──
function drawVFX() {
  for (let i = ember.vfx.length - 1; i >= 0; i--) {
    const p = ember.vfx[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life -= p.decay;
    if (p.life <= 0) { ember.vfx.splice(i, 1); continue; }
    ctx.globalAlpha = p.life * 0.9;
    if (p.glow) {
      ctx.shadowColor = p.color; ctx.shadowBlur = 12;
    }
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// ── EMBER DRAW ──
function drawEmber() {
  const e = ember;
  const L = e.limbs;
  const flip = e.facingRight ? 1 : -1;
  const cx = e.x, cy = e.y;
  const hurt = e.state === STATE.HURT;
  const dead = e.isDead || e.state === STATE.DEATH;
  const alpha = dead ? 0.5 : 1;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(flip, 1);
  ctx.globalAlpha = alpha;

  // Flash red on hurt
  if (hurt) {
    ctx.filter = 'hue-rotate(180deg) saturate(3)';
  }

  const pct = e.stateTimer; // for parry glow

  // ── SABER GLOW (behind character) ──
  const saberGlow = 0.5 + Math.sin(e.animT * 2.5) * 0.3;
  ctx.shadowColor = EMBER_COLORS.saber;
  ctx.shadowBlur = 20 * saberGlow;

  // ── LEGS (back) ──
  drawLimb(ctx, 0, -10, L.legL_up, 30, 5, EMBER_COLORS.pants, L.legL_low, 26, 4, EMBER_COLORS.boot, EMBER_COLORS.pants);
  // ── LEG R ──
  drawLimb(ctx, 5, -10, L.legR_up, 30, 6, EMBER_COLORS.pants, L.legR_low, 26, 5, EMBER_COLORS.boot, EMBER_COLORS.pants);

  ctx.shadowBlur = 0;

  // ── TORSO ──
  ctx.save();
  ctx.rotate(L.torsoRot);
  // Coat
  ctx.fillStyle = EMBER_COLORS.coat;
  ctx.beginPath();
  ctx.roundRect(-16, -100, 32, 60, 4);
  ctx.fill();
  // Shirt (green)
  ctx.fillStyle = EMBER_COLORS.shirt;
  ctx.beginPath();
  ctx.roundRect(-12, -95, 24, 40, 3);
  ctx.fill();
  // Belt
  ctx.fillStyle = EMBER_COLORS.belt;
  ctx.fillRect(-16, -48, 32, 8);

  // ── COAT TAIL ──
  ctx.save();
  ctx.translate(0, -40);
  ctx.rotate(L.coatTail);
  ctx.fillStyle = EMBER_COLORS.coat;
  ctx.beginPath();
  ctx.moveTo(-14, 0); ctx.lineTo(-18, 35); ctx.lineTo(0, 28); ctx.lineTo(14, 0);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // ── ARM LEFT (Mana-Saber arm) — draw behind ──
  ctx.save();
  ctx.translate(12, -90);
  ctx.rotate(L.armL_up);
  ctx.fillStyle = EMBER_COLORS.coat;
  ctx.beginPath(); ctx.roundRect(0, 0, 10, 28, 3); ctx.fill();
  ctx.fillStyle = EMBER_COLORS.skin;
  ctx.beginPath(); ctx.roundRect(2, 25, 8, 22, 3); ctx.fill();

  // Lower arm
  ctx.translate(5, 28);
  ctx.rotate(L.armL_low);
  ctx.fillStyle = EMBER_COLORS.coat;
  ctx.beginPath(); ctx.roundRect(-4, 0, 9, 22, 3); ctx.fill();

  // ── MANA-SABER ──
  ctx.translate(0, 22);
  const saberAlpha = e.state === STATE.PARRY ? 1 :
                     e.state === STATE.DASH_ATTACK ? 1 : 0.9;
  ctx.globalAlpha = saberAlpha * alpha;
  ctx.shadowColor = EMBER_COLORS.saber;
  ctx.shadowBlur = 14 + Math.sin(e.animT*3)*4;
  // Hilt
  ctx.fillStyle = EMBER_COLORS.blaster;
  ctx.fillRect(-4, 0, 8, 10);
  // Blade
  const bladeGrd = ctx.createLinearGradient(0, 10, 0, 60);
  bladeGrd.addColorStop(0, '#a0e8ff');
  bladeGrd.addColorStop(1, 'rgba(64,200,255,0)');
  ctx.fillStyle = bladeGrd;
  ctx.beginPath(); ctx.moveTo(-3, 10); ctx.lineTo(3, 10); ctx.lineTo(1, 60); ctx.lineTo(-1, 60); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 0;
  ctx.restore();

  // ── ARM RIGHT (Steam-Blaster arm) ──
  ctx.save();
  ctx.translate(-12, -90);
  ctx.rotate(L.armR_up);
  ctx.fillStyle = EMBER_COLORS.coat;
  ctx.beginPath(); ctx.roundRect(-10, 0, 10, 28, 3); ctx.fill();
  ctx.fillStyle = EMBER_COLORS.skin;
  ctx.beginPath(); ctx.roundRect(-10, 25, 8, 22, 3); ctx.fill();

  ctx.translate(-5, 28);
  ctx.rotate(L.armR_low);
  ctx.fillStyle = EMBER_COLORS.coat;
  ctx.beginPath(); ctx.roundRect(-5, 0, 10, 22, 3); ctx.fill();
  ctx.translate(0, 22);

  // ── STEAM-BLASTER ──
  ctx.fillStyle = EMBER_COLORS.blaster;
  ctx.beginPath(); ctx.roundRect(-14, 0, 22, 10, 3); ctx.fill();
  ctx.fillStyle = EMBER_COLORS.metal;
  ctx.beginPath(); ctx.roundRect(-14, 3, 6, 4, 2); ctx.fill();
  // Barrel glow on shoot
  if (L.shootMuzzle > 0) {
    ctx.globalAlpha = L.shootMuzzle * 0.9 * alpha;
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(-16, 5, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = alpha;
  }
  ctx.restore();

  // ── HEAD ──
  ctx.save();
  ctx.translate(0, -100);
  ctx.rotate(L.headRot + L.torsoRot);
  // Neck
  ctx.fillStyle = EMBER_COLORS.skin;
  ctx.fillRect(-4, 0, 8, 10);
  // Face
  ctx.fillStyle = EMBER_COLORS.skin;
  ctx.beginPath(); ctx.ellipse(0, -16, 15, 18, 0, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#3a2a0a';
  ctx.beginPath(); ctx.ellipse(6, -18, 3.5, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-5, -18, 3.5, 3, 0, 0, Math.PI*2); ctx.fill();
  // Eyebrow
  ctx.strokeStyle = '#8b4513'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(3,-24); ctx.lineTo(10,-22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-3,-24); ctx.lineTo(-10,-22); ctx.stroke();
  // Smile
  ctx.strokeStyle = '#c87050'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0,-13,5, 0.2, Math.PI-0.2); ctx.stroke();

  // ── HAIR ──
  ctx.save();
  ctx.rotate(L.hairSwing);
  ctx.fillStyle = EMBER_COLORS.hair;
  // Main hair mass
  ctx.beginPath();
  ctx.moveTo(-14, -18);
  ctx.bezierCurveTo(-20,-40, -10,-48, 0,-45);
  ctx.bezierCurveTo(10,-48, 22,-42, 16,-22);
  ctx.bezierCurveTo(14,-18, 12,-14, 8,-16);
  ctx.bezierCurveTo(4,-20, -4,-20, -14,-18);
  ctx.fill();
  // Hair wisps
  ctx.beginPath();
  ctx.moveTo(14,-28);
  ctx.bezierCurveTo(22,-35, 28+L.hairSwing*20,-20, 24,-12);
  ctx.bezierCurveTo(20,-8, 18,-5, 16,-8);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-12,-26);
  ctx.bezierCurveTo(-22,-32, -28-L.hairSwing*15,-18, -20,-10);
  ctx.bezierCurveTo(-17,-7, -14,-5, -13,-9);
  ctx.fill();
  ctx.restore(); // hair
  ctx.restore(); // head
  ctx.restore(); // torso

  ctx.restore(); // ember
  ctx.globalAlpha = 1;
  ctx.filter = 'none';
}

// Draw a limb segment (upper + lower)
function drawLimb(ctx2, ox, oy, rotUp, lenUp, wUp, colUp, rotLow, lenLow, wLow, colLow, shadow) {
  ctx2.save();
  ctx2.translate(ox, oy);
  ctx2.rotate(rotUp);
  ctx2.fillStyle = colUp;
  ctx2.beginPath(); ctx2.roundRect(-wUp/2, 0, wUp, lenUp, wUp/2); ctx2.fill();
  ctx2.translate(0, lenUp);
  ctx2.rotate(rotLow);
  ctx2.fillStyle = colLow;
  ctx2.beginPath(); ctx2.roundRect(-wLow/2, 0, wLow, lenLow, wLow/2); ctx2.fill();
  ctx2.restore();
}

// ── HP Bar ──
function drawHUD() {
  const e = ember;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(20, 20, 162, 22);
  const hpPct = e.hp / 100;
  const hpColor = hpPct > 0.5 ? '#40dd40' : hpPct > 0.25 ? '#dddd40' : '#dd4040';
  ctx.fillStyle = hpColor;
  ctx.fillRect(22, 22, 158 * hpPct, 18);
  ctx.strokeStyle = '#c8a84b'; ctx.lineWidth = 1;
  ctx.strokeRect(20, 20, 162, 22);
  ctx.fillStyle = '#fff'; ctx.font = '12px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText('HP: ' + e.hp, 26, 35);

  // State label in badge
  badge.textContent = e.isDead ? 'DEATH' : e.state;
}

// ──────────────────────────────────────────────
//  MAIN LOOP
// ──────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawVFX();
  updatePhysics();
  updateAnimation();
  drawEmber();
  drawHUD();
  requestAnimationFrame(loop);
}

// R to restart
window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    ember.x = W/2; ember.y = GROUND_Y;
    ember.vy = 0; ember.hp = 100;
    ember.isDead = false; ember.facingRight = true;
    ember.vfx.length = 0;
    setState(STATE.IDLE);
  }
});

loop();
</script>
</body>
</html>
